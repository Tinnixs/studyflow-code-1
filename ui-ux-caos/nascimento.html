<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI/UX DO CAOS - DATA DE NASCIMENTO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header glitch">UI/UX DO CAOS v0.8β</div>

    <div class="hero">
        <h1>A PIOR DATA<br>DE NASCIMENTO</h1>
        <p class="sub">Prepare-se para sofrer. É intencional.</p>
    </div>

    <div class="card">
        <div class="steps">
            <div class="dot ativo" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
            <div class="dot" id="dot-4"></div>
        </div>

        <!-- STEP 1 -->
        <div class="step ativo" id="step-1">
            <div class="counter" id="click-counter">01</div>
            <div class="target" id="click-target">😈</div>
            <button class="btn" id="btn-confirmar-dia">CONFIRMAR DIA</button>
        </div>

        <!-- STEP 2 -->
        <div class="step" id="step-2">
            <label>ARRASTE O SLIDER (boa sorte)</label>
            <input type="range" id="slider-mes" min="1" max="12" value="6">
            <div class="val" id="slider-val">???</div>
            <button class="btn fugitivo" id="btn-confirmar-mes">CONFIRMAR MÊS</button>
        </div>

        <!-- STEP 3 -->
        <div class="step" id="step-3">
            <div class="display" id="keyboard-display">
                <span id="ano-digitado">____</span>
            </div>
            <div class="teclado" id="teclado-grid"></div>
            <button class="btn cancel" id="btn-limpar-ano">APAGAR TUDO</button>
        </div>

        <!-- STEP 4 -->
        <div class="step" id="step-4">
            <div class="final">
                <div class="confete">🎉💥</div>
                <div class="label">VOCÊ SOBREVIVEU!</div>
                <div class="data" id="resultado-data-display">--/--/----</div>
            </div>
            <button class="btn salvar" id="btn-salvar-indexeddb">💾 SALVAR NO INDEXEDDB</button>
            <div class="banner" id="salvo-banner" style="display:none;">
                ✅ SALVO! (ou não...)
            </div>
        </div>
    </div>

    <script type="module" src="db.js"></script>
    <script type="module" src="controller.js"></script>
</body>
</html>
