<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow | Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── AJUSTES ESPECÍFICOS DO PERFIL ─────────────────────────── */
    .pagina {
      max-width: 1100px; margin: 0 auto;
      padding: calc(80px + var(--s5)) var(--s4) var(--s7);
      display: grid; grid-template-columns: 320px 1fr;
      gap: var(--s4); align-items: start;
    }

    /* Card Perfil */
    .card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; position: relative;
      display: flex; flex-direction: column; align-items: center; box-shadow: var(--shadow-card);
    }
    .card__header {
      height: 120px; width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
      position: relative;
    }
    .card__avatar {
      width: 100px; height: 100px; background: var(--bg-surface);
      border: 4px solid var(--bg-base); border-radius: 50%;
      margin-top: -50px; z-index: 2; display: flex;
      align-items: center; justify-content: center; font-size: 48px;
    }
    .card__info { padding: 20px; text-align: center; width: 100%; }
    .card__nome { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .card__curso { color: var(--text-secondary); font-size: 14px; margin-bottom: 15px; }

    /* Barra de XP */
    .xp-container { width: 100%; padding: 0 20px 20px; }
    .xp-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; color: var(--text-secondary); }
    .xp-barra { height: 8px; background: var(--bg-base); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
    .xp-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s ease; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
    .stat-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      padding: 15px; border-radius: var(--r-lg); text-align: center;
    }
    .stat-card__valor { display: block; font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--accent); }
    .stat-card__label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }

    /* Modal Ajustes */
    .avatar-op { 
      cursor: pointer; font-size: 30px; padding: 10px; border-radius: 10px; 
      border: 1px solid var(--border); transition: 0.2s; text-align: center;
    }
    .avatar-op:hover { background: var(--accent-glow); border-color: var(--accent); }
    .avatar-op.selecionado { border-color: var(--accent); background: var(--accent-glow); }

    @media (max-width: 900px) {
      .pagina { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="nav" id="nav-principal">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo"><span class="nav__logo-dot"></span>StudyFlow</a>
    
    <ul class="nav__links" id="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="cronograma.html">Cronograma</a></li>
      <li><a href="foco.html">Modo Foco</a></li>
      <li><a href="perfil.html" aria-current="page">Perfil</a></li>
    </ul>

    <div class="nav__actions">
      <div class="toggle-tema">
        <input type="checkbox" id="toggle-tema" class="toggle-tema__input">
        <label for="toggle-tema" class="toggle-tema__track">
          <span class="toggle-tema__thumb"><span id="icone-tema">🌙</span></span>
        </label>
      </div>
      <button class="nav__toggle" id="nav-toggle" aria-label="Abrir Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<main class="pagina">
  <aside>
    <div class="card">
      <div class="card__header"></div>
      <div class="card__avatar" id="avatar-display">🐱</div>
      <div class="card__info">
        <h2 class="card__nome" id="nome-display">Estudante</h2>
        <p class="card__curso" id="curso-display">Meu Objetivo</p>
        <div class="card__nivel" id="nivel-tag" style="background: var(--accent-glow); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-block;">
          ⚡ Nível 1
        </div>
      </div>
      <div class="xp-container">
        <div class="xp-label"><span>XP: <span id="xp-valor">0</span></span><span id="xp-pct">0%</span></div>
        <div class="xp-barra"><div class="xp-fill" id="xp-fill"></div></div>
      </div>
      <button class="btn-nav" id="btn-abrir-modal" style="margin-bottom: 20px; width: 85%; justify-content: center;">Editar Perfil</button>
    </div>
  </aside>

  <section class="painel">
    <h1 class="painel__titulo">Meu <span>Desempenho</span></h1>
    <p class="painel__subtitulo" id="boas-vindas">Olá! Veja como estão seus estudos hoje.</p>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-card__valor" id="stat-horas">0h</span>
        <span class="stat-card__label">Total Focado</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__valor" id="stat-sequencia">0</span>
        <span class="stat-card__label">Dias de Fogo</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__valor" id="stat-tarefas">0</span>
        <span class="stat-card__label">Tarefas</span>
      </div>
    </div>

    </section>
</main>

<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal__titulo">Editar Perfil</div>
    <div class="form-grupo">
      <label>Escolha seu Avatar</label>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px;">
        <div class="avatar-op" data-emoji="🐱">🐱</div>
        <div class="avatar-op" data-emoji="🦊">🦊</div>
        <div class="avatar-op" data-emoji="🦁">🦁</div>
        <div class="avatar-op" data-emoji="🚀">🚀</div>
      </div>
    </div>
    <div class="form-grupo">
      <label>Nome</label>
      <input type="text" id="input-nome" placeholder="Seu nome">
    </div>
    <div class="form-grupo">
      <label>Curso/Objetivo</label>
      <input type="text" id="input-curso" placeholder="Ex: Engenharia">
    </div>
    <div class="modal__acoes">
      <button class="btn-cancelar" id="btn-fechar-modal">Cancelar</button>
      <button class="btn-nav" id="btn-salvar">Salvar Alterações</button>
    </div>
  </div>
</div>

<script>
  // ── 1. CONTROLE DO MENU E TEMA ──────────────────────────────
  const navToggle = document.getElementById('nav-toggle');
  const navLinks  = document.getElementById('nav-links');
  const inputTema = document.getElementById('toggle-tema');
  const iconeTema = document.getElementById('icone-tema');

  // Abrir/Fechar Menu
  navToggle.addEventListener('click', () => {
    navLinks.classList.toggle('aberto');
    navToggle.classList.toggle('aberto');
  });

  // Alternar Tema
  inputTema.addEventListener('change', () => {
    const tema = inputTema.checked ? 'light' : 'dark';
    document.documentElement.setAttribute('data-tema', tema);
    iconeTema.textContent = inputTema.checked ? '☀️' : '🌙';
    localStorage.setItem('sf-tema', tema);
  });

  // Carregar Tema Salvo
  if (localStorage.getItem('sf-tema') === 'light') {
    inputTema.checked = true;
    document.documentElement.setAttribute('data-tema', 'light');
    iconeTema.textContent = '☀️';
  }

  // ── 2. DADOS DO PERFIL ──────────────────────────────────────
  let perfil = JSON.parse(localStorage.getItem('sf-perfil')) || {
    nome: 'Estudante',
    curso: 'Estudos',
    avatar: '🐱'
  };

  const modal = document.getElementById('modal-edit');
  let emojiSelecionado = perfil.avatar;

  function atualizarInterface() {
    document.getElementById('nome-display').textContent = perfil.nome;
    document.getElementById('curso-display').textContent = perfil.curso;
    document.getElementById('avatar-display').textContent = perfil.avatar;
    document.getElementById('boas-vindas').textContent = `Olá, ${perfil.nome}! Veja como estão seus estudos hoje.`;
    
    // Dados simulados de progresso baseados no Modo Foco
    const minutos = parseInt(localStorage.getItem('sf-foco-total') || '0');
    const horas = (minutos / 60).toFixed(1);
    document.getElementById('stat-horas').textContent = horas + 'h';
    
    // Lógica simples de Nível
    const nivel = Math.floor(minutos / 300) + 1; // sobe de nível a cada 5 horas
    document.getElementById('nivel-tag').textContent = `⚡ Nível ${nivel}`;
    const progressoXP = (minutos % 300) / 3; // Porcentagem para a barra
    document.getElementById('xp-fill').style.width = progressoXP + '%';
    document.getElementById('xp-pct').textContent = Math.round(progressoXP) + '%';
    document.getElementById('xp-valor').textContent = minutos * 10;
  }

  // ── 3. LÓGICA DO MODAL ──────────────────────────────────────
  document.getElementById('btn-abrir-modal').onclick = () => {
    document.getElementById('input-nome').value = perfil.nome;
    document.getElementById('input-curso').value = perfil.curso;
    modal.classList.add('visivel');
  };

  document.getElementById('btn-fechar-modal').onclick = () => modal.classList.remove('visivel');

  document.querySelectorAll('.avatar-op').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.avatar-op').forEach(item => item.classList.remove('selecionado'));
      el.classList.add('selecionado');
      emojiSelecionado = el.dataset.emoji;
    };
  });

  document.getElementById('btn-salvar').onclick = () => {
    perfil.nome = document.getElementById('input-nome').value;
    perfil.curso = document.getElementById('input-curso').value;
    perfil.avatar = emojiSelecionado;
    localStorage.setItem('sf-perfil', JSON.stringify(perfil));
    atualizarInterface();
    modal.classList.remove('visivel');
  };

  // Inicializa
  atualizarInterface();
</script>

</body>
</html>
